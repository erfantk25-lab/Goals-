apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goalplanner-ingress
  namespace: goalplanner
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.goalplanner.ai
      secretName: goalplanner-tls
  rules:
    - host: api.goalplanner.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: goalplanner-api-svc
                port:
                  number: 80
